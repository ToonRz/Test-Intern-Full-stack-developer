name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm install --prefix frontend

      - name: Run backend tests
        run: pytest tests/ -v --tb=short

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run frontend tests
        run: npm test --prefix frontend -- --run

  # ── Security Scan ───────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    # Required for github/codeql-action/upload-sarif to publish to Security tab
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Cache Trivy DB between runs — DB ขนาด ~200MB ดาวน์โหลดครั้งแรก 2-5 นาที
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ hashFiles('.trivyignore', '.github/workflows/ci.yml') }}
          restore-keys: trivy-db-

      # Pin version + skip dirs ที่ไม่จำเป็น — ลดเวลา scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          skip-dirs: |
            frontend/node_modules
            frontend/dist
            backend/__pycache__
            .git
            .pytest_cache
            _internal

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # Inline Bandit แทน third-party action ที่ถูกลบไปแล้ว (usageTwist3r/bandit-check)
      - name: Set up Python 3.11 for Bandit
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install --quiet bandit

      - name: Run Bandit security check (Python)
        run: |
          echo "::group::Bandit output"
          bandit -r backend -lll --skip B101  # B101 = assert (test files), -lll = low+above
          echo "::endgroup::"

  # ── Build & Push Docker Images ─────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl version --client

      - name: Create GHCR imagePullSecret (idempotent)
        env:
          NAMESPACE: log-management-staging
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace="$NAMESPACE" \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build helm/log-management

      - name: Deploy to staging
        env:
          NAMESPACE: log-management-staging
          IMAGE_TAG: develop-${{ github.sha }}
          IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
          IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
        run: |
          helm upgrade --install log-management helm/log-management \
            --namespace "$NAMESPACE" \
            -f helm/log-management/values-staging.yaml \
            --set backend.image.repository="${IMAGE_BACKEND}" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${IMAGE_FRONTEND}" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set backend.env.SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --set backend.env.DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
            --set backend.env.ALLOWED_ORIGINS="https://staging.log.example.com" \
            --wait --timeout 10m

      - name: Smoke test (backend readiness)
        env:
          NAMESPACE: log-management-staging
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=backend-backend \
            -n "$NAMESPACE" \
            --timeout=5m

  # ── Deploy to Production ───────────────────────────────────────────────
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl version --client

      - name: Create GHCR imagePullSecret (idempotent)
        env:
          NAMESPACE: log-management
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace="$NAMESPACE" \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

      - name: Build Helm dependencies
        run: helm dependency build helm/log-management

      - name: Validate required secrets
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          if [ -z "$PROD_DATABASE_URL" ] || [ -z "$SECRET_KEY" ]; then
            echo "::error::PROD_DATABASE_URL and SECRET_KEY secrets are required"
            exit 1
          fi

      - name: Deploy to production
        env:
          NAMESPACE: log-management
          IMAGE_TAG: main-${{ github.sha }}
          IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
          IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
        run: |
          helm upgrade --install log-management helm/log-management \
            --namespace "$NAMESPACE" \
            -f helm/log-management/values-prod.yaml \
            --set backend.image.repository="${IMAGE_BACKEND}" \
            --set backend.image.tag="${IMAGE_TAG}" \
            --set frontend.image.repository="${IMAGE_FRONTEND}" \
            --set frontend.image.tag="${IMAGE_TAG}" \
            --set backend.env.SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --set backend.env.DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" \
            --wait --timeout 15m

      - name: Smoke test (backend readiness)
        env:
          NAMESPACE: log-management
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=backend-backend \
            -n "$NAMESPACE" \
            --timeout=5m

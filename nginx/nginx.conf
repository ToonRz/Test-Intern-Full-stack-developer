# nginx.conf — terminates HTTPS, reverse-proxies to frontend + backend,
# and streams UDP syslog traffic to the backend listener.

events {
    worker_connections 1024;
}

# stream block MUST be a sibling of http {} — placing it inside http {}
# makes nginx refuse to start.
stream {
    upstream syslog_backend {
        server backend:514;
    }

    server {
        listen 514 udp;
        proxy_pass syslog_backend;
        # Syslog has no TLS — protect the path with network-level controls.
    }

    # High #11: spec §5.1 mandates UDP AND TCP syslog on :514. Default
    # rsyslog/syslog-ng use octet-counted TCP framing; we forward raw bytes
    # to the backend's TCP listener (which already handles LF-delimited and
    # octet-counted input — see backend/main.py:_handle_tcp_client).
    server {
        listen 514;
        proxy_pass syslog_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # I-9: raise the body size cap to match the backend's 16 MiB ingest
    # limit. The previous default (1 MB) silently rejected legitimate
    # /ingest/batch uploads with 413 once a daily export crossed the
    # threshold.
    client_max_body_size 16m;

    # Runtime DNS resolution. With `resolve` on each upstream `server` line,
    # nginx re-resolves the hostname every `valid` interval via Docker's
    # embedded DNS (127.0.0.11). When `make up` / `docker compose up --build`
    # recreates a container with a new IP, nginx picks it up on the next
    # request — no 502, no manual nginx restart needed.
    resolver 127.0.0.11 valid=1s ipv6=off;

    # `resolve` tells nginx to re-resolve the hostname per `resolver` cadence
    # instead of caching the startup IP. This is the canonical fix for the
    # 502 Bad Gateway we were seeing after container recreations.
    # `zone` is required when `resolve` is used — nginx stores the resolved
    # IPs in shared memory so all worker processes can share the cache.
    upstream backend_upstream {
        zone backend_zone 64k;
        server backend:8000 resolve;
        keepalive 16;
    }

    upstream frontend_upstream {
        zone frontend_zone 64k;
        server frontend:80 resolve;
        keepalive 16;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        gzip on;
        gzip_types text/plain application/json application/javascript text/css;
        gzip_min_length 1000;

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Metrics — restrict to internal network in production via firewall rules.
        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
        }
    }
}

# Top-level Ingress — routes external HTTPS traffic to the SPA + API.
#
#   /         → frontend (SPA, with rewrite so client-side routes resolve)
#   /api      → backend FastAPI
#   /docs     → backend Swagger (handy for live demos)
#
# Syslog 514 is NOT routed here — that's a UDP/TCP service exposed by an
# ingress-nginx ConfigMap (see helm/log-management/values.yaml tcp.services).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.namespace | default "log-management" }}
  annotations:
    # TLS passthrough handled by cert-manager; ACME cert provisioned automatically.
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | default "letsencrypt-prod" }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # The frontend uses History API routing — without this annotation a
    # deep-link to /logs returns the backend's 404 instead of the SPA shell.
    nginx.ingress.kubernetes.io/app-root: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName | default (printf "%s-tls" .Chart.Name) }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                # I-15: compute the subchart's rendered Service name from the
                # parent's release name. The subchart's `_helpers.tpl` produces
                # `<Release.Name>-<subchart-name>` (e.g. `log-management-backend`)
                # when no `fullnameOverride` is set. Computing the same string
                # here keeps the Ingress in lock-step with the subchart.
                name: {{ .Values.backend.fullnameOverride | default (printf "%s-backend" .Release.Name) }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /docs(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.backend.fullnameOverride | default (printf "%s-backend" .Release.Name) }}
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.frontend.fullnameOverride | default (printf "%s-frontend" .Release.Name) }}
                port:
                  number: {{ .Values.frontend.service.port }}

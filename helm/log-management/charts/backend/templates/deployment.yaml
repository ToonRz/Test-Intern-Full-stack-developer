apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-backend
  namespace: {{ .Values.namespace | default "log-management" }}
  labels:
    app: {{ .Chart.Name }}-backend
    version: {{ .Values.image.tag | default "latest" }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-backend
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ .Chart.Name }}-backend
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            # Non-secret config — plain strings in the ConfigMap.
            - configMapRef:
                name: {{ .Chart.Name }}-backend-config
            # Sensitive (SECRET_KEY, DATABASE_URL) — operators MUST set
            # these via --set or ExternalSecret. backend/main.py refuses
            # to boot with a weak SECRET_KEY, so an unset secret is
            # detected at startup, not silently at first request.
            - secretRef:
                name: {{ .Chart.Name }}-backend-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-backend
  namespace: {{ .Values.namespace | default "log-management" }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ .Chart.Name }}-backend

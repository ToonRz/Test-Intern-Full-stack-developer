# Sensitive backend configuration. Operators MUST set these via --set or a
# sealed-Secret / ExternalSecret — never commit real values to values.yaml.
#
#   helm install ... --set env.SECRET_KEY=$(openssl rand -hex 32) \
#                    --set env.DATABASE_URL=postgresql+asyncpg://...
#
# backend/main.py refuses to boot with a weak SECRET_KEY when DEBUG=false, so
# an unset secret is detected at startup, not silently at first request.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-backend-secret
  namespace: {{ .Values.namespace | default "log-management" }}
  labels:
    app: {{ .Chart.Name }}-backend
type: Opaque
stringData:
  {{- if .Values.env.SECRET_KEY }}
  SECRET_KEY: {{ .Values.env.SECRET_KEY | quote }}
  {{- end }}
  {{- if .Values.env.DATABASE_URL }}
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  {{- end }}

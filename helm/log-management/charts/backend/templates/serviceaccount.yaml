# ServiceAccount for the backend pod. Empty for now but provides a stable
# identity for future RBAC bindings (e.g. reading Secrets from ExternalSecrets,
# emitting Prometheus metrics, scraping pod metadata). Some clusters require a
# ServiceAccount to exist before pods can be admitted under restrictive
# PodSecurityPolicies.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Values.namespace | default "log-management" }}
  labels:
    app: backend
automountServiceAccountToken: false

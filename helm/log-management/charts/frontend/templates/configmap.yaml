# Frontend env is mostly baked into the static bundle at build time, but we
# expose VITE_API_URL via ConfigMap so a single image can be deployed to
# staging/prod by overriding the value without rebuilding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-config
  namespace: {{ .Values.namespace | default "log-management" }}
  labels:
    app: frontend
data:
  VITE_API_URL: {{ .Values.env.VITE_API_URL | quote }}

apiVersion: apps/v1
kind: Deployment
metadata:
  # I-15: match the parent chart's release name (e.g. `log-management-frontend`).
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Values.namespace | default "log-management" }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      {{- if or .Values.imagePullSecretName .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecretName | default .Values.global.imagePullSecretName }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "frontend.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.fullname" . }}
  namespace: {{ .Values.namespace | default "log-management" }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: frontend

server {
    # Listen on both IPv4 and IPv6 — Alpine resolves `localhost` to ::1 first,
    # and a bare `listen 80` binds IPv4 only, which broke the healthcheck.
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Never cache the SPA shell or its hashed JS — otherwise a stale
        # index.html pointing at the old chunk would silently serve the
        # previous build even after a redeploy.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
